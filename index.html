<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frase do Dia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
  }
  .center { text-align: center; padding: 20px; }
  .pt { font-size: 2.2rem; color: #111; margin-bottom: 20px; }
  .en { font-size: 1.2rem; color: #888; }
</style>
</head>
<body>
<div class="center">
  <div class="pt" id="pt">A carregar…</div>
  <div class="en" id="en"></div>
</div>

<script>
const TIME_ZONE = "Europe/Lisbon";
const START_DATE = "2026-03-04"; // поменяй на дату старта ротации

function lisbonDayNumber() {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: TIME_ZONE,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
  }).formatToParts(new Date());

  const y = Number(parts.find(p => p.type === "year").value);
  const m = Number(parts.find(p => p.type === "month").value);
  const d = Number(parts.find(p => p.type === "day").value);

  return Math.floor(Date.UTC(y, m - 1, d) / 86400000);
}

function startDayNumber() {
  const [y, m, d] = START_DATE.split("-").map(Number);
  return Math.floor(Date.UTC(y, m - 1, d) / 86400000);
}

async function main() {
  const res = await fetch("phrases.json", { cache: "no-store" });
  if (!res.ok) throw new Error("phrases.json HTTP " + res.status);
  const phrases = await res.json();

  const idx = ((lisbonDayNumber() - startDayNumber()) % phrases.length + phrases.length) % phrases.length;
  const p = phrases[idx];

  document.getElementById('pt').textContent = p.pt || "";
  document.getElementById('en').textContent = p.en || "";
}

main().catch(err => {
  document.getElementById('pt').textContent = "Erro ao carregar frases.";
  document.getElementById('en').textContent = String(err);
});
</script>
</body>
</html>
